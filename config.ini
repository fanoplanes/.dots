[colors]
# Base16 Gruvbox dark, hard - alacritty color config
#background = #1d2021
#foreground = #d5c4a1
#black = #1d2021
#red = #fb4934
#green = #b8bb26
#yellow = #fabd2f
#blue = #83a598
#magenta = #d3869b
#cyan = #8ec07c
#white = #d5c4a1

background = ${xrdb:background}
foreground = ${xrdb:foreground}
black = ${xrdb:color0}
red = ${xrdb:color1}
green = ${xrdb:color2}
yellow = ${xrdb:color3}
blue = ${xrdb:color4}
magenta = ${xrdb:color5}
cyan = ${xrdb:color6}
white = ${xrdb:color7}

[bar/example]
;monitor = ${env:MONITOR:HDMI-1}
width = 100%
height = 34
;offset-x = 10%
;offset-y = 1%
radius = 0.0
fixed-center = true
dpi-x=141
dpi-y=141

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.foreground}

border-size = 0
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin-left = 0
module-margin-right = 0

font-0 = monospace:pixelsize=8;1
font-1 = Noto Color Emoji:scale=14;0
font-2 = FiraCode Nerd Font:pixelsize=10;2
font-3 = FiraCode Nerd Font:style=Bold:pixelsize=16;3

modules-left = bspwm separator space xwindow
modules-center = round-left date round-right
modules-right = filesystem space pulseaudio space xkeyboard space xbacklight space eth wlan space battery space powermenu space

tray-position = right
tray-padding = 2
;tray-background = #2E3440

wm-restack = bspwm
;wm-restack = i3

;override-redirect = true

scroll-up = bspwm-desknext
scroll-down = bspwm-deskprev

;scroll-up = i3wm-wsnext
;scroll-down = i3wm-wsprev

;cursor-click = pointer
;cursor-scroll = ns-resize

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

format-prefix = "Ô†í "
format-prefix-foreground = ${colors.foreground}
format-prefix-underline = ${colors.yellow}

label-layout = %layout%
label-layout-underline = ${colors.yellow}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-background = ${colors.yellow}
label-indicator-underline = ${colors.yellow}

[module/filesystem]
type = internal/fs
interval = 30

mount-0 = /

label-mounted = %{F#83a598}%mountpoint%%{F-}: %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.foreground}

[module/bspwm]
type = internal/bspwm

label-focused = %index%
label-focused-background = ${colors.background}
label-focused-underline= ${colors.foreground}
label-focused-padding = 2

label-occupied = %index%
label-occupied-padding = 2

label-urgent = %index%!
label-urgent-background = ${colors.red}
label-urgent-padding = 2

label-empty = %index%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

; Separator in between workspaces
label-separator =Óė°

ws-icon-0=1;ÔČ©
ws-icon-1=2;ÔĄ°
ws-icon-2=3;Ôáó

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

; Only show workspaces on the same output as the bar
;pin-workspaces = true

label-mode-padding = 0
label-mode-foreground = #000
label-mode-background = ${colors.foreground}

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-background = ${colors.background}
label-focused-underline= ${colors.foreground}
label-focused-padding = 2

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-padding = 2

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${self.label-focused-underline}
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-padding = 2

; Separator in between workspaces
 label-separator =Óė°


[module/mpd]
type = internal/mpd
host=localhost
port=6666
format-online = <label-song>  <icon-prev> <icon-stop> <toggle> <icon-next>

icon-prev = Ô¶≠
icon-stop = Ôßö
icon-play = Ô§Č
icon-pause = Ô££
icon-next = Ô¶¨

label-song= %artist% - %title%
label-song-maxlen = 40
label-song-ellipsis = true

[module/xbacklight]
type = internal/xbacklight

format = <label> <bar>
label =
format-prefix = "Ôóü "
format-prefix-foreground = ${colors.foreground}
bar-width = 10
bar-indicator = |
bar-indicator-foreground = ${colors.foreground}
bar-indicator-font = 2
bar-fill = ‚ĒĀ
bar-fill-font = 3
bar-fill-foreground = ${colors.green}
bar-empty = ‚ĒÄ
bar-empty-font = 3
bar-empty-foreground = ${colors.foreground}

[module/backlight-acpi]
inherit = module/xbacklight
type = internal/backlight
card = intel_backlight

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ÓČ¶  "
format-prefix-foreground = ${colors.foreground}
